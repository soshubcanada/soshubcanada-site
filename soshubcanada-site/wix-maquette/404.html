<!DOCTYPE html>
<html lang="fr" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page introuvable | SOS Hub Canada</title>
  <meta name="robots" content="noindex">
  <meta property="og:locale" content="fr_CA">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --gold: #C8A35F; --navy: #1B2A4A; --cream: #FAF8F5; }
    body { font-family: 'Inter', system-ui, sans-serif; background: var(--cream); color: #1a1a1a; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 40px 24px; }
    h1, h2 { font-family: 'Playfair Display', Georgia, serif; }
    .emoji { font-size: 80px; margin-bottom: 24px; }
    h1 { font-size: 48px; color: var(--navy); margin-bottom: 16px; }
    p { font-size: 18px; color: #666; max-width: 480px; margin: 0 auto 40px; line-height: 1.6; }
    .btn { display: inline-flex; align-items: center; gap: 8px; padding: 16px 36px; background: linear-gradient(135deg, #C8A35F, #A8873F); color: white; font-weight: 700; font-size: 16px; border-radius: 12px; text-decoration: none; transition: all 0.3s; box-shadow: 0 4px 15px rgba(200,163,95,0.3); margin: 8px; }
    .btn:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(200,163,95,0.4); }
    .btn-outline { background: transparent; border: 2px solid var(--navy); color: var(--navy); box-shadow: none; }
    .btn-outline:hover { background: var(--navy); color: white; box-shadow: none; }
    .links { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; }
  </style>
</head>
<body>
  <div class="emoji">🍁</div>
  <h1>Page introuvable</h1>
  <p>Cette page n'existe pas ou a été déplacée. Mais votre nouvelle vie au Canada, lui, est bien réel!</p>
  <div class="links">
    <a href="/" class="btn">🏠 Retour à l'accueil</a>
    <a href="/contact" class="btn btn-outline">💬 Nous contacter</a>
  </div>
</body>
</html>
