<script type="text/babel" data-presets="react">
const{useState,useEffect,useRef}=React;

function useReveal(threshold=0.14){
  const ref=useRef(null);
  const[visible,setVisible]=useState(false);
  useEffect(()=>{
    const el=ref.current;if(!el)return;
    const obs=new IntersectionObserver(([e])=>{if(e.isIntersecting){setVisible(true);obs.unobserve(el)}},{threshold});
    obs.observe(el);return()=>obs.disconnect();
  },[]);
  return[ref,visible];
}

function useActiveSection(ids){
  const[active,setActive]=useState(ids[0]);
  useEffect(()=>{
    const obs=new IntersectionObserver(entries=>{
      entries.forEach(e=>{if(e.isIntersecting)setActive(e.target.id)});
    },{threshold:.2,rootMargin:"-80px 0px -55% 0px"});
    ids.forEach(id=>{const el=document.getElementById(id);if(el)obs.observe(el)});
    return()=>obs.disconnect();
  },[]);
  return active;
}

            <h3 style={{fontFamily:sf,fontSize:28,fontWeight:600,color:GL,margin:"0 0 12px"}}>{t.cor_intl}</h3>
            <div style={{background:`linear-gradient(90deg,transparent,${GOLD}60,transparent)`,height:1,width:50,margin:"0 auto 14px"}}/>
            <p style={{fontSize:16,color:CL,opacity:.9,lineHeight:1.7,margin:0,maxWidth:500,marginLeft:"auto",marginRight:"auto"}}>{t.cor_intl_d}</p>
          </div>
        </div>
      </div>
    </section>

    {/* PARRAINAGE */}
    <section ref={parRef} className="section-pad" style={{padding:"88px 28px",background:CR}}>
      <div style={ss}>
        <div className={`reveal${parVis?" visible":""}`}><SH label={t.parr_label} title={t.parr_title} sf={sf}/></div>
        <p className={`reveal${parVis?" visible":""}`} style={{textAlign:"center",fontSize:17,color:TM,margin:"16px auto 52px",maxWidth:680,lineHeight:1.75,transitionDelay:".1s"}}>{t.parr_sub}</p>
        <div className="stagger card-grid" style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(240px,1fr))",gap:22}}>
          {[{n:"1",t:t.p1_t,d:t.p1_d},{n:"2",t:t.p2_t,d:t.p2_d},{n:"3",t:t.p3_t,d:t.p3_d}].map((p,i)=>
            <div key={i} className={`reveal card-lift card-glow${parVis?" visible":""}`} style={{background:CL,border:`1px solid ${BG}`,padding:"32px 24px",textAlign:"center",position:"relative",overflow:"hidden",cursor:"default"}}>
              <div style={{width:52,height:52,borderRadius:"50%",background:`linear-gradient(135deg,${G},${GD})`,color:GL,margin:"0 auto 20px",display:"flex",alignItems:"center",justifyContent:"center",fontSize:22,fontWeight:800,fontFamily:sf,border:`2.5px solid ${GOLD}`,boxShadow:`0 0 0 6px ${GOLD}15`}}>{p.n}</div>
              <h4 style={{fontFamily:sf,fontSize:24,fontWeight:600,color:G,margin:"0 0 10px"}}>{p.t}</h4>
              <p style={{fontSize:15,color:TM,lineHeight:1.72,margin:0}}>{p.d}</p>
            </div>
          )}
        </div>
      </div>
    </section>

    {/* CHIFFRES */}
    <section ref={statRef} className="section-pad" style={{padding:"72px 28px",background:GX,color:CL,borderTop:`3px solid ${GOLD}`,borderBottom:`3px solid ${GOLD}`}}>
      <div style={ss}>
        <h3 className={`reveal${statVis?" visible":""}`} style={{fontFamily:sf,fontSize:"clamp(26px,3.5vw,36px)",fontWeight:600,textAlign:"center",margin:"0 0 52px",color:W}}>{t.stats_title}</h3>
        <div className="stagger stats-grid" style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(220px,1fr))",gap:32}}>
          {[{n:t.st1_n,d:t.st1_d},{n:t.st2_n,d:t.st2_d},{n:t.st3_n,d:t.st3_d}].map((s,i)=>
            <div key={i} className={`reveal${statVis?" visible":""}`} style={{textAlign:"center",padding:"20px 12px",borderRight:i<2?`1px solid ${GOLD}35`:"none"}}>
              <div className={statVis?"counter-animate":""} style={{fontFamily:sf,fontSize:"clamp(38px,4.5vw,54px)",fontWeight:600,color:GL,lineHeight:1,marginBottom:14}}>{s.n}</div>
              <div style={{fontSize:15,color:CL,opacity:.85,lineHeight:1.6,maxWidth:180,margin:"0 auto"}}>{s.d}</div>
            </div>
          )}
        </div>
      </div>
    </section>

    {/* ENGAGEMENTS */}
    <section ref={engRef} className="section-pad" style={{padding:"88px 28px",background:CR}}>
      <div style={ss}>
        <div className={`reveal${engVis?" visible":""}`}><SH label={t.eng_label} title={t.eng_title} sf={sf}/></div>
        <div className="stagger card-grid" style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(240px,1fr))",gap:22,marginTop:52}}>
          {[{t:t.e1_t,d:t.e1_d},{t:t.e2_t,d:t.e2_d},{t:t.e3_t,d:t.e3_d},{t:t.e4_t,d:t.e4_d}].map((e,i)=>
            <div key={i} className={`reveal card-lift${engVis?" visible":""}`} style={{padding:"26px 22px",background:CL,border:`1px solid ${BD}`,borderTop:`3px solid ${G}`,cursor:"default"}}>
              <div style={{width:36,height:36,borderRadius:"50%",background:`${G}15`,border:`1.5px solid ${G}30`,display:"flex",alignItems:"center",justifyContent:"center",marginBottom:14,fontSize:16}}>✓</div>
              <h4 style={{fontFamily:sf,fontSize:20,fontWeight:600,color:TX,margin:"0 0 10px"}}>{e.t}</h4>
              <p style={{fontSize:15,color:TM,lineHeight:1.7,margin:0}}>{e.d}</p>
            </div>
          )}
        </div>
      </div>
    </section>

    {/* COMPARISON TABLE */}
    <section ref={compRef} className="section-pad" style={{padding:"72px 16px",background:CR,borderTop:`1px solid ${BD}`}}>
      <div style={{...ss,padding:"0 12px"}}>
        <div className={`reveal${compVis?" visible":""}`}><SH label={t.comp_label} title={t.comp_title} sf={sf}/></div>
        <div className={`reveal${compVis?" visible":""}`} style={{overflowX:"auto",marginTop:44,transitionDelay:".15s",margin:"44px -12px 0"}}>
          <table className="compare-table">
            <thead><tr><th>{t.comp_h1}</th><th>{t.comp_h2}</th><th>{t.comp_h3}</th><th style={{background:G}}>{t.comp_h4}</th></tr></thead>
            <tbody>
              {[
                {c:t.cp1,v1:<span className="cross">✗</span>,v2:"~",v3:<span className="check">✓</span>},
                {c:t.cp2,v1:<span className="cross">✗</span>,v2:<span className="check">✓</span>,v3:<span className="check">✓</span>},
                {c:t.cp3,v1:"24-72h",v2:"3-7j",v3:<b>2-4h</b>},
                {c:t.cp4,v1:"3-8%",v2:"5-15%",v3:<b>1-2%</b>},
                {c:t.cp5,v1:<span className="cross">✗</span>,v2:<span className="check">✓</span>,v3:<span className="check">✓</span>},
                {c:t.cp6,v1:<span className="cross">✗</span>,v2:<span className="cross">✗</span>,v3:<span className="check">✓ 24/7</span>}
              ].map((r,i)=>
                <tr key={i}><td>{r.c}</td><td>{r.v1}</td><td>{r.v2}</td><td className="highlight-col">{r.v3}</td></tr>
              )}
            </tbody>
          </table>
        </div>
      </div>
    </section>

    {/* FAQ */}
    <section ref={faqRef} className="section-pad" style={{padding:"72px 28px",background:CL,borderTop:`1px solid ${BD}`}}>
      <div style={{...ss,maxWidth:780}}>
        <div className={`reveal${faqVis?" visible":""}`}><SH label={t.faq_label} title={t.faq_title} sf={sf}/></div>
        <div className={`reveal${faqVis?" visible":""}`} style={{marginTop:44,transitionDelay:".1s"}}>
          {[{q:t.fq1_q,a:t.fq1_a},{q:t.fq2_q,a:t.fq2_a},{q:t.fq3_q,a:t.fq3_a},{q:t.fq4_q,a:t.fq4_a},{q:t.fq5_q,a:t.fq5_a}].map((f,i)=>
            <div key={i} className="faq-item">
              <div className="faq-q" onClick={()=>setOpenFaq(openFaq===i?null:i)}>
                <span>{f.q}</span>
                <span className={`faq-chevron${openFaq===i?" open":""}`}>▼</span>
              </div>
              <div className={`faq-a${openFaq===i?" open":""}`}>{f.a}</div>
            </div>
          )}
        </div>
      </div>
    </section>

    {/* PARTENAIRES MARQUEE */}
    <section style={{padding:"56px 0",background:CL,borderTop:`1px solid ${BD}`,borderBottom:`1px solid ${BD}`,overflow:"hidden"}}>
      <div style={{textAlign:"center",marginBottom:28}}>
        <div style={{fontSize:11,color:GOLD,fontWeight:700,letterSpacing:2.5,textTransform:"uppercase"}}>{t.part_label}</div>
        <h2 style={{fontFamily:sf,fontSize:"clamp(22px,2.8vw,32px)",fontWeight:600,color:TX,margin:"12px 0 0",lineHeight:1.2}}>{t.part_title}</h2>
      </div>
      <div className="marquee-wrap">
        <div className="marquee-inner">
          {[...partners,...partners].map((p,i)=>
            <div key={i} style={{padding:"16px 40px",borderRight:`1px solid ${BD}`,whiteSpace:"nowrap",fontFamily:sf,fontSize:17,fontWeight:600,color:G,letterSpacing:.3,flexShrink:0}}>{p}</div>
          )}
        </div>
      </div>
    </section>

    {/* INSCRIPTION */}
    <section id="cta" ref={ctaRef} className="section-pad" style={{padding:"88px 28px",background:CR}}>
      <div style={{...ss,maxWidth:660}}>
        <div className={`reveal${ctaVis?" visible":""}`}><SH label={t.cta_label} title={t.cta_title} sf={sf}/></div>
        <p className={`reveal${ctaVis?" visible":""}`} style={{textAlign:"center",fontSize:17,color:TM,margin:"16px auto 40px",transitionDelay:".1s"}}>{t.cta_sub}</p>
        {sub?
          <div style={{background:CL,border:`2px solid ${G}`,padding:"44px 24px",textAlign:"center"}}>
            <div style={{fontSize:38,marginBottom:14}}>🎉</div>
            <div style={{fontFamily:sf,fontSize:26,fontWeight:600,color:G,marginBottom:10}}>{t.cta_ok_t}</div>
            <div style={{fontSize:14,color:TM,lineHeight:1.75}}>{t.cta_ok_d}</div>
          </div>
        :
          <div className={`reveal${ctaVis?" visible":""}`} style={{background:CL,border:`1px solid ${BD}`,padding:"32px 24px",transitionDelay:".2s"}}>
            <div className="form-2col" style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14,marginBottom:14}}>
              <FI l={t.cta_name} v={form.n} c={v=>setForm({...form,n:v})} r={rtl}/>
              <FI l={t.cta_country} v={form.c} c={v=>setForm({...form,c:v})} r={rtl}/>
            </div>
            <div style={{marginBottom:14}}><FI l={t.cta_email} v={form.e} c={v=>setForm({...form,e:v})} t="email" r={rtl}/></div>
            <div className="form-2col" style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14,marginBottom:24}}>
              <FI l={t.cta_phone} v={form.p} c={v=>setForm({...form,p:v})} t="tel" r={rtl}/>
              <FI l={t.cta_origin} v={form.o} c={v=>setForm({...form,o:v})} r={rtl}/>
            </div>
            <button className="cta-pulse" onClick={()=>form.e&&setSub(true)} style={{width:"100%",background:G,color:CL,padding:"17px",border:`2px solid ${G}`,fontSize:16,fontWeight:700,cursor:"pointer",letterSpacing:.8,textTransform:"uppercase",borderRadius:2,fontFamily:"inherit",transition:"background .2s",minHeight:52}}>{t.cta_btn}</button>
            <p style={{fontSize:12,color:TS,lineHeight:1.65,marginTop:14,fontStyle:"italic"}}>{t.cta_legal}</p>
            <div style={{marginTop:24,paddingTop:24,borderTop:`1px dashed ${BG}`,textAlign:"center"}}>
              <div style={{fontSize:12,color:TS,marginBottom:14,fontStyle:"italic"}}>{t.cta_or}</div>
              <a href="https://wa.me/14384001234" target="_blank" style={{display:"inline-flex",alignItems:"center",gap:10,background:"#25D366",color:W,padding:"15px 28px",textDecoration:"none",fontSize:14,fontWeight:700,borderRadius:2,minHeight:48}}>
                <WA size={20}/>{t.cta_wa}
              </a>
            </div>
          </div>
        }
      </div>
    </section>

    {/* FOOTER */}
    <footer style={{background:GX,color:CL,padding:"52px 28px 28px"}}>
      <div style={ss}>
        <div className="footer-grid" style={{display:"grid",gridTemplateColumns:"2fr 1fr 1fr 1fr",gap:32,marginBottom:36}}>
          <div>
            <div style={{display:"flex",alignItems:"center",gap:14,marginBottom:16,justifyContent:"inherit"}}>
              <div style={{width:48,height:48,borderRadius:"50%",overflow:"hidden",border:`2px solid ${GOLD}`,flexShrink:0,boxShadow:`0 2px 12px rgba(184,146,59,.3)`}}>
                <img src="/dinarzone/logo.png" alt="DinarZone" style={{width:"100%",height:"100%",objectFit:"cover",display:"block"}}/>
              </div>
              <div>
                <div style={{fontFamily:sf,fontSize:22,fontWeight:600,color:CL,lineHeight:1}}>DinarZone</div>
                <div style={{fontSize:9,color:GL,letterSpacing:1.8,textTransform:"uppercase",marginTop:4}}>{t.h_motto}</div>
              </div>
            </div>
            <p style={{fontSize:13,color:CL,opacity:.72,lineHeight:1.78,maxWidth:380}}>{t.footer_about}</p>
          </div>
          <div>
            <h5 style={{fontSize:10,color:GL,fontWeight:700,letterSpacing:1.8,textTransform:"uppercase",marginBottom:16}}>{t.footer_leg}</h5>
            <div style={{display:"flex",flexDirection:"column",gap:12,fontSize:13}}>
              {[t.footer_m,t.footer_p,t.footer_t,t.footer_c].map((l,i)=><a key={i} href="#" style={{color:CL,opacity:.7,textDecoration:"none",minHeight:32,display:"flex",alignItems:"center"}}>{l}</a>)}
            </div>
          </div>
          <div>
            <h5 style={{fontSize:10,color:GL,fontWeight:700,letterSpacing:1.8,textTransform:"uppercase",marginBottom:16}}>{t.footer_contact}</h5>
            <div style={{display:"flex",flexDirection:"column",gap:12,fontSize:13,color:CL,opacity:.7}}>
              <div>contact@dinarzone.com</div><div>Doha, Qatar</div><div>Montréal, Canada</div>
            </div>
          </div>
          <div>
            <h5 style={{fontSize:10,color:GL,fontWeight:700,letterSpacing:1.8,textTransform:"uppercase",marginBottom:16}}>{t.footer_follow}</h5>
            <div style={{display:"flex",flexDirection:"column",gap:12,fontSize:13}}>
              {["LinkedIn","Twitter / X","Facebook","Instagram"].map((s,i)=><a key={i} href="#" style={{color:CL,opacity:.7,textDecoration:"none",minHeight:32,display:"flex",alignItems:"center"}}>{s}</a>)}
            </div>
          </div>
        </div>
        {/* LEGAL DISCLAIMER */}
        <div style={{borderTop:`1px solid ${GOLD}15`,paddingTop:18,marginBottom:18}}>
          <p style={{fontSize:10,color:CL,opacity:.4,lineHeight:1.7,maxWidth:800,margin:"0 auto",textAlign:"center"}}>{t.footer_disc}</p>
        </div>
        <div className="footer-bottom" style={{borderTop:`1px solid ${GOLD}25`,paddingTop:22,display:"flex",justifyContent:"space-between",alignItems:"center",fontSize:11,color:CL,opacity:.55,flexWrap:"wrap",gap:12}}>
          <div>© {new Date().getFullYear()} Yara AI (QFC). {t.footer_copy}.</div>
          <div style={{fontStyle:"italic",fontFamily:sf}}>{t.top_l}</div>
        </div>
      </div>
    </footer>

    {/* WHATSAPP FLOTTANT */}
    <a className="wa-float" href="https://wa.me/14384001234" target="_blank" style={{position:"fixed",bottom:26,[rtl?"left":"right"]:26,zIndex:200,width:58,height:58,borderRadius:"50%",background:"#25D366",display:"flex",alignItems:"center",justifyContent:"center",textDecoration:"none",boxShadow:"0 8px 32px rgba(37,211,102,.4)"}}>
      <WA size={28}/>
    </a>

    {/* SCROLL TO TOP */}
    <button className={`scroll-top${showTop?" show":""}`} onClick={()=>window.scrollTo({top:0,behavior:"smooth"})}>
      <ChevUp/>
    </button>

    {/* SOCIAL PROOF TOAST */}
    {toast && (
      <div className={`proof-toast${toastHide?" hiding":""}`}>
        <div style={{display:"flex",alignItems:"center",gap:12}}>
          <div style={{width:36,height:36,borderRadius:"50%",background:`linear-gradient(135deg,${G},${GD})`,color:GL,display:"flex",alignItems:"center",justifyContent:"center",fontSize:14,fontWeight:700,fontFamily:sf,border:`2px solid ${GOLD}`,flexShrink:0}}>{toast.n.charAt(0)}</div>
          <div>
            <div style={{fontSize:14,fontWeight:700,color:TX}}>{toast.n}</div>
            <div style={{fontSize:12,color:TS}}>{toast.c} {t.proof_joined}</div>
          </div>
        </div>
      </div>
    )}

    {/* STICKY MOBILE CTA */}
    <div className={`sticky-cta${stickyShow?" show":""}`}>
      <a href="#cta">{t.hero_cta1}</a>
    </div>

  </div>);
}

const root=ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(App));
</script>
</body>
</html>
