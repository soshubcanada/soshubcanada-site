<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&family=Playfair+Display:wght@700;800&display=swap');

  body {
    width: 1080px;
    height: 1080px;
    background: linear-gradient(135deg, #1B2A4A 0%, #0F1A2E 60%, #1B2A4A 100%);
    font-family: 'Inter', sans-serif;
    overflow: hidden;
    position: relative;
  }

  /* Gold accent circles */
  .circle1 {
    position: absolute;
    width: 600px;
    height: 600px;
    background: radial-gradient(circle, rgba(200,163,95,0.15) 0%, transparent 70%);
    border-radius: 50%;
    top: -100px;
    right: -150px;
  }
  .circle2 {
    position: absolute;
    width: 400px;
    height: 400px;
    background: radial-gradient(circle, rgba(200,163,95,0.1) 0%, transparent 70%);
    border-radius: 50%;
    bottom: 50px;
    left: -100px;
  }

  /* Top bar */
  .top-bar {
    background: linear-gradient(90deg, #C8A35F, #A8873F);
    padding: 18px 60px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .top-bar .logo {
    font-family: 'Playfair Display', serif;
    font-weight: 800;
    font-size: 28px;
    color: white;
  }
  .top-bar .logo span { color: #1B2A4A; }
  .top-bar .badge {
    background: rgba(255,255,255,0.2);
    color: white;
    font-size: 13px;
    font-weight: 700;
    padding: 8px 20px;
    border-radius: 50px;
    letter-spacing: 0.5px;
  }

  /* Main content */
  .content {
    position: relative;
    z-index: 2;
    padding: 70px 60px 50px;
    text-align: center;
  }

  .free-tag {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: rgba(200,163,95,0.15);
    border: 1.5px solid rgba(200,163,95,0.4);
    color: #C8A35F;
    font-size: 16px;
    font-weight: 800;
    padding: 12px 30px;
    border-radius: 50px;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 40px;
  }

  h1 {
    font-family: 'Playfair Display', serif;
    font-size: 72px;
    font-weight: 800;
    color: white;
    line-height: 1.15;
    margin-bottom: 25px;
  }
  h1 .gold { color: #C8A35F; }

  .subtitle {
    font-size: 22px;
    color: rgba(255,255,255,0.7);
    line-height: 1.6;
    max-width: 700px;
    margin: 0 auto 50px;
  }

  /* CTA Button */
  .cta {
    display: inline-flex;
    align-items: center;
    gap: 12px;
    background: linear-gradient(135deg, #C8A35F, #A8873F);
    color: white;
    font-size: 24px;
    font-weight: 800;
    padding: 22px 50px;
    border-radius: 16px;
    text-transform: none;
    box-shadow: 0 15px 40px rgba(200,163,95,0.3);
    margin-bottom: 30px;
  }
  .cta .arrow {
    font-size: 28px;
  }

  /* Stats */
  .stats {
    display: flex;
    justify-content: center;
    gap: 50px;
    margin-top: 40px;
  }
  .stat {
    text-align: center;
  }
  .stat .num {
    font-size: 42px;
    font-weight: 900;
    color: #C8A35F;
  }
  .stat .label {
    font-size: 14px;
    color: rgba(255,255,255,0.5);
    margin-top: 4px;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  /* Bottom flags */
  .flags {
    position: absolute;
    bottom: 40px;
    left: 0;
    right: 0;
    text-align: center;
    font-size: 18px;
    color: rgba(255,255,255,0.4);
    letter-spacing: 1px;
  }
  .flags span { font-size: 30px; margin: 0 6px; }
</style>
</head>
<body>
  <div class="circle1"></div>
  <div class="circle2"></div>

  <div class="top-bar">
    <div class="logo">SOS Hub <span>Canada</span></div>
    <div class="badge">MONTREAL, QC</div>
  </div>

  <div class="content">
    <div class="free-tag">&#10003; Evaluation gratuite</div>
    <h1>Immigrer au <span class="gold">Canada</span> en 2026?</h1>
    <p class="subtitle">
      Testez votre admissibilite en 2 minutes.<br>
      Resultat instantane + plan d'action personnalise.
    </p>
    <div class="cta">
      Tester mon admissibilite <span class="arrow">&rarr;</span>
    </div>

    <div class="stats">
      <div class="stat">
        <div class="num">500+</div>
        <div class="label">Familles</div>
      </div>
      <div class="stat">
        <div class="num">98%</div>
        <div class="label">Satisfaction</div>
      </div>
      <div class="stat">
        <div class="num">24h</div>
        <div class="label">Reponse</div>
      </div>
    </div>
  </div>

  <div class="flags">
    <span>&#127474;&#127462;</span>
    <span>&#127465;&#127487;</span>
    <span>&#127481;&#127475;</span>
    <span>&#127467;&#127479;</span>
    <span>&#127464;&#127474;</span>
    <span>&#127469;&#127481;</span>
  </div>
</body>
</html>
